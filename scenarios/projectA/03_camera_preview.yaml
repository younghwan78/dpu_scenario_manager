# DPU Scenario: Camera Preview
# ISP outputs preview YUV (SBWC) + GPU renders camera UI
name: "Camera_Preview"
description: "Camera application preview mode — ISP preview stream with GPU UI controls"
clock:
  min_pixel_clock_mhz: 150.0
  min_axi_clock_mhz: 200.0
  aclk_mhz: 400.0
  mif_min_freq_mhz: 845.0
display:
  resolution: "FHD+"
  width: 1080
  height: 2400
  fps: 60
layers:
  - name: "Preview_Y"
    source: "ISP"
    format: "NV12"
    format_category: "YUV"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.47, compressed_gbps: 0.28 }
    compression_type: "SBWC"
    rdma_index: 0
  - name: "Preview_UV"
    source: "ISP"
    format: "NV12"
    format_category: "YUV"
    size: { width: 540, height: 1200 }
    bw: { original_gbps: 0.23, compressed_gbps: 0.14 }
    compression_type: "SBWC"
    rdma_index: 1
  - name: "Viewfinder_Frame"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.59, compressed_gbps: 0.35 }
    compression_type: "SAJC"
    rdma_index: 2
  - name: "Camera_Controls"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 300 }
    bw: { original_gbps: 0.07 }
    compression_type: "None"
    rdma_index: 3
  - name: "Grid_Overlay"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.59 }
    compression_type: "None"
    rdma_index: 4
  - name: "StatusBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 80 }
    bw: { original_gbps: 0.02 }
    compression_type: "None"
    rdma_index: 5
