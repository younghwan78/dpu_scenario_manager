# DPU Scenario: Camera Recording
# ISP preview + CODEC thumbnail + GPU UI — all three source IPs active
name: "Camera_Recording"
description: "Camera recording mode — ISP preview, CODEC last-capture thumbnail, and GPU controls"
clock:
  min_pixel_clock_mhz: 150.0
  min_axi_clock_mhz: 267.0
  aclk_mhz: 533.0
  mif_min_freq_mhz: 1066.0
display:
  resolution: "FHD+"
  width: 1080
  height: 2400
  fps: 60
layers:
  - name: "Preview_Y"
    source: "ISP"
    format: "NV12"
    format_category: "YUV"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.47, compressed_gbps: 0.28 }
    compression_type: "SBWC"
    rdma_index: 0
  - name: "Preview_UV"
    source: "ISP"
    format: "NV12"
    format_category: "YUV"
    size: { width: 540, height: 1200 }
    bw: { original_gbps: 0.23, compressed_gbps: 0.14 }
    compression_type: "SBWC"
    rdma_index: 1
  - name: "Thumbnail_Y"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 256, height: 256 }
    bw: { original_gbps: 0.01 }
    compression_type: "None"
    rdma_index: 2
  - name: "Thumbnail_UV"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 128, height: 128 }
    bw: { original_gbps: 0.005 }
    compression_type: "None"
    rdma_index: 3
  - name: "Camera_UI"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.59, compressed_gbps: 0.35 }
    compression_type: "SAJC"
    rdma_index: 4
  - name: "Rec_Indicator"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 200, height: 60 }
    bw: { original_gbps: 0.003 }
    compression_type: "None"
    rdma_index: 5
  - name: "StatusBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 80 }
    bw: { original_gbps: 0.02 }
    compression_type: "None"
    rdma_index: 6
  - name: "NavigationBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 120 }
    bw: { original_gbps: 0.03 }
    compression_type: "None"
    rdma_index: 7
