# DPU Scenario: PIP (Picture-in-Picture) Mode
# Two CODEC video streams + GPU UI — highest layer count, all format/compression combos
name: "PIP_Mode"
description: "Picture-in-Picture — main video + PIP video (dual CODEC) with GPU UI overlay"
clock:
  min_pixel_clock_mhz: 150.0
  min_axi_clock_mhz: 267.0
  aclk_mhz: 533.0
  mif_min_freq_mhz: 1066.0
display:
  resolution: "WQHD+"
  width: 1440
  height: 3120
  fps: 60
layers:
  - name: "Main_Video_Y"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 3840, height: 2160 }
    dst: { x: 0, y: 200, width: 1440, height: 2700 }
    bw: { original_gbps: 1.49, compressed_gbps: 0.89 }
    compression_type: "SBWC"
    rdma_index: 0
  - name: "Main_Video_UV"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 1920, height: 1080 }
    dst: { x: 0, y: 200, width: 1440, height: 2700 }
    bw: { original_gbps: 0.75, compressed_gbps: 0.45 }
    compression_type: "SBWC"
    rdma_index: 1
  - name: "PIP_Video_Y"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 720, height: 480 }
    dst: { x: 900, y: 2400, width: 480, height: 360 }
    bw: { original_gbps: 0.06, compressed_gbps: 0.04 }
    compression_type: "SBWC"
    rdma_index: 2
  - name: "PIP_Video_UV"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 360, height: 240 }
    dst: { x: 900, y: 2400, width: 480, height: 360 }
    bw: { original_gbps: 0.03, compressed_gbps: 0.02 }
    compression_type: "SBWC"
    rdma_index: 3
  - name: "PIP_Border"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 730, height: 490 }
    dst: { x: 895, y: 2395, width: 490, height: 370 }
    bw: { original_gbps: 0.08 }
    compression_type: "None"
    rdma_index: 4
  - name: "App_Background"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1440, height: 3120 }
    dst: { x: 0, y: 0, width: 1440, height: 3120 }
    bw: { original_gbps: 1.03, compressed_gbps: 0.62 }
    compression_type: "SAJC"
    rdma_index: 5
  - name: "App_Content"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1440, height: 2800 }
    dst: { x: 0, y: 200, width: 1440, height: 2700 }
    bw: { original_gbps: 0.92, compressed_gbps: 0.55 }
    compression_type: "SAJC"
    rdma_index: 6
  - name: "Notification"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1440, height: 200 }
    bw: { original_gbps: 0.07 }
    compression_type: "None"
    rdma_index: 7
  - name: "StatusBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1440, height: 80 }
    dst: { x: 0, y: 0, width: 1440, height: 80 }
    bw: { original_gbps: 0.03 }
    compression_type: "None"
    rdma_index: 8
  - name: "NavigationBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1440, height: 120 }
    dst: { x: 0, y: 3000, width: 1440, height: 120 }
    bw: { original_gbps: 0.04 }
    compression_type: "None"
    rdma_index: 9
