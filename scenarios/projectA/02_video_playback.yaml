# DPU Scenario: Video Playback
# CODEC decoded video (SBWC compressed) + GPU UI overlay
name: "Video_Playback"
description: "Full-screen video playback with UI overlay — CODEC supplies SBWC-compressed YUV"
clock:
  min_pixel_clock_mhz: 150.0
  min_axi_clock_mhz: 200.0
  aclk_mhz: 400.0
  mif_min_freq_mhz: 845.0
display:
  resolution: "FHD+"
  width: 1080
  height: 2400
  fps: 60
layers:
  - name: "Video_Y"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 1920, height: 1080 }
    bw: { original_gbps: 0.37, compressed_gbps: 0.22 }
    compression_type: "SBWC"
    rdma_index: 0
  - name: "Video_UV"
    source: "CODEC"
    format: "NV12"
    format_category: "YUV"
    size: { width: 960, height: 540 }
    bw: { original_gbps: 0.19, compressed_gbps: 0.11 }
    compression_type: "SBWC"
    rdma_index: 1
  - name: "UI_Overlay"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 2400 }
    bw: { original_gbps: 0.59, compressed_gbps: 0.35 }
    compression_type: "SAJC"
    rdma_index: 2
  - name: "StatusBar"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 80 }
    bw: { original_gbps: 0.02 }
    compression_type: "None"
    rdma_index: 3
  - name: "Subtitle"
    source: "GPU"
    format: "ARGB8888"
    format_category: "ARGB"
    size: { width: 1080, height: 200 }
    bw: { original_gbps: 0.05 }
    compression_type: "None"
    rdma_index: 4
